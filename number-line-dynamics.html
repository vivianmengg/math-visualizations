<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>n → n² + c</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf9f5;
      font-family: 'Georgia', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    canvas { flex: 1; display: block; width: 100%; cursor: crosshair; }
    #controls {
      padding: 12px 28px;
      background: #faf9f5;
      border-top: 1px solid #e0ddd5;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    #formula { font-size: 19px; color: #222; min-width: 150px; }
    label { font-size: 13px; color: #888; }
    input[type=range] { accent-color: #444; cursor: pointer; }
    #cSlider { width: 200px; }
    #speedSlider { width: 100px; }
    #cVal { font-size: 14px; color: #333; font-family: monospace; }
    #fpLabel { font-size: 13px; color: #999; }
    .sep { width: 1px; height: 28px; background: #ddd; }
    .orbit-controls { display: flex; align-items: center; gap: 8px; }
    .transport {
      display: flex; align-items: center;
      background: #f4f2ee;
      border: 1px solid #e0ddd8;
      border-radius: 20px;
      padding: 3px 4px;
      gap: 2px;
    }
    button {
      font-family: Georgia, serif;
      font-size: 13px;
      padding: 4px 12px;
      border: none;
      background: transparent;
      border-radius: 16px;
      cursor: pointer;
      color: #555;
      transition: background 0.12s;
    }
    button:hover:not(:disabled) { background: #e8e3dc; }
    button:disabled { opacity: 0.28; cursor: default; }
    #btnPlay {
      background: #2a3d8f;
      color: #fff;
      padding: 5px 18px;
      font-size: 14px;
    }
    #btnPlay:hover:not(:disabled) { background: #1e2e6e; }
    #btnPlay:disabled { background: #2a3d8f; }
    #stepInfo { font-size: 13px; color: #e0728a; min-width: 160px; font-style: italic; }
    .hint { font-size: 12px; color: #bbb; font-style: italic; margin-left: auto; }
    #orbitPanel {
      position: absolute;
      top: 16px; right: 16px;
      width: 175px;
      max-height: 55vh;
      background: rgba(250,249,245,0.93);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 12px;
      overflow-y: auto;
      display: none;
      pointer-events: none;
    }
    #orbitPanel .panel-title {
      font-family: Georgia, serif;
      font-size: 11px;
      color: #999;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    #orbitPanel .term {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      border-bottom: 1px solid #f0ede8;
      color: #444;
    }
    #orbitPanel .term.current { color: #e0728a; font-weight: bold; }
    #orbitPanel .term .idx { color: #aaa; min-width: 28px; }
  </style>
</head>
<body>
<div style="position:relative; flex:1; display:flex; flex-direction:column;">
<canvas id="canvas" style="flex:1; display:block; width:100%; cursor:crosshair;"></canvas>
<div id="orbitPanel">
  <div class="panel-title">Sequence</div>
  <div id="orbitTerms"></div>
</div>
</div>
<div id="controls">
  <div id="formula">f(n) = n² + c</div>
  <label>c = <span id="cVal">+0.00</span>&ensp;
    <input type="range" id="cSlider" min="-2.5" max="0.5" step="0.01" value="0">
  </label>
  <div class="sep"></div>
  <div class="orbit-controls">
    <div class="transport">
      <button id="btnReset" disabled title="Restart from beginning">↺</button>
      <button id="btnPlay" disabled>▶</button>
      <button id="btnStep" disabled title="Step forward">→</button>
    </div>
    <button id="btnClear" disabled title="Clear orbit" style="font-size:15px; padding:3px 10px;">×</button>
    <label style="font-size:12px; color:#aaa;">speed <input type="range" id="speedSlider" min="0.3" max="3" step="0.1" value="1"></label>
  </div>
  <div id="stepInfo">click a number to trace</div>
  <div class="sep"></div>
  <div id="fpLabel"></div>
  <div class="hint">click line · step or play orbit</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let c = 0;

const DEFAULT_MIN = -4.5, DEFAULT_MAX = 5.5;
const VIEW_LIMIT  = 1e6;
const LERP_SPEED  = 0.04;

let VIEW_MIN = DEFAULT_MIN, VIEW_MAX = DEFAULT_MAX;
let targetMin = DEFAULT_MIN, targetMax = DEFAULT_MAX;

function resetView() {
  VIEW_MIN = DEFAULT_MIN; VIEW_MAX = DEFAULT_MAX;
  targetMin = DEFAULT_MIN; targetMax = DEFAULT_MAX;
}

function showArcInView(a, b) {
  if (!isFinite(a) || !isFinite(b)) return;
  const pad = (targetMax - targetMin) * 0.12;
  if (a >= targetMin + pad && a <= targetMax - pad &&
      b >= targetMin + pad && b <= targetMax - pad) return;
  const lo = Math.min(a, b), hi = Math.max(a, b);
  const span = Math.max(hi - lo, 1);
  targetMin = lo - span * 0.35;
  targetMax = hi + span * 0.35;
}

function centerTightOnPoint(point) {
  if (!isFinite(point) || Math.abs(point) > VIEW_LIMIT) return;
  const prev = orbitStep > 0 ? orbit[orbitStep - 1] : point;
  const hopSpan = Math.abs(point - prev);
  const currentRange = targetMax - targetMin;
  if (hopSpan < currentRange * 0.25) return; // small hop — leave view alone
  const range = Math.max(Math.abs(point) * 0.1, hopSpan * 0.25, 6);
  targetMin = point - range * 0.5;
  targetMax = point + range * 0.5;
}

function stepView() {
  VIEW_MIN += (targetMin - VIEW_MIN) * LERP_SPEED;
  VIEW_MAX += (targetMax - VIEW_MAX) * LERP_SPEED;
}

function niceInterval(range) {
  const rough = range / 7;
  const mag = Math.pow(10, Math.floor(Math.log10(Math.max(rough, 0.001))));
  const norm = rough / mag;
  if (norm < 1.5) return mag;
  if (norm < 3.5) return 2 * mag;
  if (norm < 7.5) return 5 * mag;
  return 10 * mag;
}

function nicePoints() {
  const interval = niceInterval(VIEW_MAX - VIEW_MIN);
  const first = Math.ceil(VIEW_MIN / interval) * interval;
  const pts = [];
  for (let n = first; n <= VIEW_MAX + interval * 0.01; n += interval) {
    pts.push(Math.round(n / interval) * interval);
  }
  return pts;
}

function W()     { return canvas.offsetWidth; }
function H()     { return canvas.offsetHeight; }
function lineY() { return H() * 0.56; }
function toCanvasX(n) { return (n - VIEW_MIN) / (VIEW_MAX - VIEW_MIN) * W(); }
function toMathX(px)  { return VIEW_MIN + px / W() * (VIEW_MAX - VIEW_MIN); }
function f(n) { return n * n + c; }

// --- Dynamics helpers ---
function escapeFraction(n, maxIter = 80) {
  let z = n;
  for (let i = 0; i < maxIter; i++) {
    z = z * z + c;
    if (Math.abs(z) > 10) return (maxIter - i) / maxIter;
  }
  return 0;
}

function fixedPoints() {
  const disc = 1 - 4 * c;
  if (disc < 0) return [];
  const sq = Math.sqrt(disc);
  return [(1 + sq) / 2, (1 - sq) / 2];
}
function isStable(fp) { return Math.abs(2 * fp) < 1; }

// --- Hover state ---
let hoveredN = null;

// --- Orbit animation state ---
let orbit      = [];
let orbitStep  = 0;
let arcT       = 0;
let pauseT     = 0;
const PAUSE_DUR = 0.4;
let isPlaying  = false;
let speed      = 1.0;

function computeOrbit(start, maxSteps = 40) {
  const pts = [start];
  let z = start;
  for (let i = 0; i < maxSteps; i++) {
    z = z * z + c;
    pts.push(z);
    if (!isFinite(z) || Math.abs(z) > 1e6) break;
  }
  return pts;
}

function setOrbit(start) {
  orbit = computeOrbit(start);
  orbitStep = 0;
  arcT = 0;
  pauseT = 0;
  isPlaying = false;
  resetView();
  updateOrbitControls();
  updateOrbitPanel();
}

function clearOrbit() {
  orbit = []; orbitStep = 0; arcT = 0; pauseT = 0; isPlaying = false;
  resetView();
  updateOrbitControls();
  updateOrbitPanel();
  document.getElementById('stepInfo').textContent = 'click a number to trace';
}

function updateOrbitControls() {
  const hasOrbit   = orbit.length > 0;
  const canAdvance = hasOrbit && orbitStep < orbit.length - 1;
  document.getElementById('btnStep').disabled  = !canAdvance || isPlaying;
  document.getElementById('btnPlay').disabled  = !canAdvance;
  document.getElementById('btnReset').disabled = !hasOrbit;
  document.getElementById('btnClear').disabled = !hasOrbit;
  document.getElementById('btnPlay').textContent = isPlaying ? '⏸' : '▶';
  if (hasOrbit) {
    const cur = orbit[orbitStep];
    document.getElementById('stepInfo').textContent = isFinite(cur)
      ? `step ${orbitStep}: n = ${cur.toFixed(3)}`
      : `step ${orbitStep}: → ∞`;
  }
}

function fmtVal(v) {
  if (!isFinite(v)) return '∞';
  const a = Math.abs(v);
  if (a >= 1e9) return v.toExponential(2);
  if (a >= 1e6) return (v/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return (v/1e3).toFixed(2) + 'k';
  if (a >= 100) return v.toFixed(1);
  if (a >= 10)  return v.toFixed(2);
  return v.toFixed(3);
}

function updateOrbitPanel() {
  const panel = document.getElementById('orbitPanel');
  const terms = document.getElementById('orbitTerms');
  if (!orbit.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  terms.innerHTML = '';
  for (let i = 0; i <= orbitStep && i < orbit.length; i++) {
    const div = document.createElement('div');
    div.className = 'term' + (i === orbitStep ? ' current' : '');
    div.innerHTML = `<span class="idx">n<sub>${i}</sub></span><span>${fmtVal(orbit[i])}</span>`;
    terms.appendChild(div);
  }
  panel.scrollTop = panel.scrollHeight;
}

function ease(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }

function bezierPt(t, x0,y0, x1,y1, x2,y2, x3,y3) {
  const mt = 1 - t;
  return {
    x: mt**3*x0 + 3*mt**2*t*x1 + 3*mt*t**2*x2 + t**3*x3,
    y: mt**3*y0 + 3*mt**2*t*y1 + 3*mt*t**2*y2 + t**3*y3
  };
}

function arcHeight(n, fn) {
  const viewSpan = VIEW_MAX - VIEW_MIN;
  const MAX_ARC_H = H() * 0.38;
  return Math.min(Math.abs(fn - n) / viewSpan * MAX_ARC_H * 3.5, MAX_ARC_H);
}

// --- Drawing primitives ---
function drawArcShape(x1, x2, h, color, lw = 1.8) {
  const ly = lineY();
  const cx1 = toCanvasX(x1), cx2 = toCanvasX(x2);
  ctx.beginPath();
  ctx.moveTo(cx1, ly);
  ctx.bezierCurveTo(cx1, ly - h, cx2, ly - h, cx2, ly);
  ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.stroke();
  const tipDir = cx2 > cx1 ? 1 : -1;
  ctx.beginPath();
  ctx.moveTo(cx2, ly); ctx.lineTo(cx2-tipDir*9, ly-5); ctx.lineTo(cx2-tipDir*9, ly+5);
  ctx.closePath(); ctx.fillStyle = color; ctx.fill();
}

function drawArcOffEdge(x1, h, goRight, color) {
  const ly = lineY();
  const cx1 = toCanvasX(x1), cx2 = goRight ? W() + 20 : -20;
  ctx.beginPath();
  ctx.moveTo(cx1, ly);
  ctx.bezierCurveTo(cx1, ly - h, cx2, ly - h, cx2, ly);
  ctx.strokeStyle = color; ctx.lineWidth = 1.8;
  ctx.stroke();
}

function drawLoop(n, color) {
  const ly = lineY(), cx = toCanvasX(n);
  ctx.beginPath();
  ctx.arc(cx, ly - 18, 12, Math.PI * 0.15, Math.PI * 1.85);
  ctx.strokeStyle = color; ctx.lineWidth = 1.8; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx+10, ly-14); ctx.lineTo(cx+14, ly-8); ctx.lineTo(cx+4, ly-8);
  ctx.closePath(); ctx.fillStyle = color; ctx.fill();
}

// --- Draw layers ---
function drawFateBackground() {
  const ly = lineY();
  const W_ = Math.ceil(W());
  // Precompute escape values
  const vals = new Float32Array(W_);
  for (let px = 0; px < W_; px++) vals[px] = escapeFraction(toMathX(px));
  // Smooth with a small box blur to remove discrete banding
  const blur = 4;
  const smoothed = new Float32Array(W_);
  for (let px = 0; px < W_; px++) {
    let sum = 0, count = 0;
    for (let d = -blur; d <= blur; d++) {
      const i = px + d;
      if (i >= 0 && i < W_) { sum += vals[i]; count++; }
    }
    smoothed[px] = sum / count;
  }
  for (let px = 0; px < W_; px++) {
    const esc = smoothed[px];
    let r, g, b;
    if (esc === 0) { r=240; g=220; b=160; }
    else { const t=esc; r=Math.floor(160+t*40); g=Math.floor(180+t*40); b=Math.floor(210+t*45); }
    ctx.fillStyle = `rgba(${r},${g},${b},0.35)`;
    ctx.fillRect(px, ly - 6, 1.5, 12);
  }
}

function drawNumberLine() {
  const ly = lineY();
  ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W(), ly);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W()-2,ly); ctx.lineTo(W()-12,ly-5); ctx.lineTo(W()-12,ly+5);
  ctx.closePath(); ctx.fillStyle = '#333'; ctx.fill();
  ctx.font = '13px Georgia'; ctx.textAlign = 'center';
  nicePoints().forEach(n => {
    const cx = toCanvasX(n);
    ctx.beginPath(); ctx.moveTo(cx, ly-7); ctx.lineTo(cx, ly+7);
    ctx.strokeStyle='#333'; ctx.lineWidth = n===0?1.8:1; ctx.stroke();
    ctx.fillStyle='#444'; ctx.fillText(n, cx, ly+22);
  });
}

function drawFixedPoints() {
  const fps = fixedPoints(), ly = lineY();
  fps.forEach(fp => {
    if (fp < VIEW_MIN || fp > VIEW_MAX) return;
    const cx = toCanvasX(fp), stable = isStable(fp);
    const col = stable ? '#c07820' : '#c03020';
    ctx.beginPath(); ctx.arc(cx, ly, 6, 0, Math.PI*2);
    ctx.fillStyle = stable ? 'rgba(240,180,60,0.25)' : 'rgba(220,60,60,0.15)'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, ly, 5, 0, Math.PI*2);
    ctx.strokeStyle=col; ctx.lineWidth=1.8; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, ly, 2.5, 0, Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.font='12px Georgia'; ctx.fillStyle=col; ctx.textAlign='center';
    ctx.fillText(fp.toFixed(2), cx, ly-14);
    ctx.font='italic 10px Georgia'; ctx.fillStyle=col+'aa';
    ctx.fillText(stable?'stable':'unstable', cx, ly-26);
  });
  const fpLabel = document.getElementById('fpLabel');
  fpLabel.textContent = fps.length===0 ? 'No real fixed points'
    : 'Fixed pts: ' + fps.map(fp=>`${fp.toFixed(3)} ${isStable(fp)?'(stable)':'(unstable)'}`).join('  ·  ');
}

function getArcColor(n) {
  const t = escapeFraction(n);
  if (t === 0) return '#c88228'; // bounded / bouncing → warm amber
  // escaping: dark navy → bright navy
  const r = Math.floor(18  + t * 52);   // 18  → 70
  const g = Math.floor(28  + t * 82);   // 28  → 110
  const b = Math.floor(100 + t * 140);  // 100 → 240
  return `rgb(${r},${g},${b})`;
}

function drawStaticArcs() {
  const viewSpan = VIEW_MAX - VIEW_MIN, MAX_ARC_H = H() * 0.38;
  const points = [];
  for (let n = Math.ceil(VIEW_MIN); n <= Math.floor(VIEW_MAX); n++) points.push(n);
  fixedPoints().forEach(fp => {
    if (!points.some(p => Math.abs(p-fp)<0.3)) {
      const r = Math.round(fp*2)/2;
      if (!points.includes(r) && r>VIEW_MIN && r<VIEW_MAX) points.push(r);
    }
  });
  points.sort((a,b)=>a-b);

  const isHovering = hoveredN !== null;

  const offRight=[], offLeft=[];
  points.forEach(n => {
    const fn = f(n), diff = fn-n, absDiff = Math.abs(diff);
    const color = getArcColor(n);
    const esc = escapeFraction(n);
    const hovered = isHovering && Math.abs(n - hoveredN) < 0.3;
    const alpha = isHovering ? (hovered ? 1.0 : 0.1) : 0.85;
    const lw = hovered ? 2.6 : 1.8;
    const dashed = esc > 0 && !hovered;

    ctx.save();
    ctx.globalAlpha = alpha;
    if (dashed) ctx.setLineDash([5, 4]);
    if (absDiff < 0.02) { drawLoop(n, color); }
    else {
      const h = Math.min(absDiff/viewSpan*MAX_ARC_H*3.5, MAX_ARC_H);
      if (fn >= VIEW_MIN && fn <= VIEW_MAX) {
        drawArcShape(n, fn, h, color, lw);
      } else if (fn > VIEW_MAX) {
        drawArcOffEdge(n, Math.min(h, MAX_ARC_H*0.8), true, color);
        if (hovered || !isHovering) offRight.push({n, fn, color});
      } else {
        drawArcOffEdge(n, Math.min(h, MAX_ARC_H*0.8), false, color);
        if (hovered || !isHovering) offLeft.push({n, fn, color});
      }
    }
    ctx.restore();

    // Label for hovered arc
    if (hovered) {
      const ly = lineY();
      const h = Math.min(absDiff/viewSpan*MAX_ARC_H*3.5, MAX_ARC_H);
      const cx = toCanvasX(n);
      const fnStr = Math.abs(fn) >= 100 ? Math.round(fn).toString() : fn.toFixed(2);
      ctx.font = 'bold 13px Georgia';
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.fillText(`${n} → ${fnStr}`, cx, ly - h - 14);
    }
  });

  if (!isHovering) {
    ctx.font='13px Georgia';
    offRight.forEach(({n,fn,color},i) => {
      const s = Math.abs(fn)>=100 ? Math.round(fn).toString() : fn.toFixed(1);
      ctx.fillStyle=color; ctx.textAlign='right';
      ctx.fillText(`${n} → ${s}`, W()-10, 18+i*19);
    });
    offLeft.forEach(({n,fn,color},i) => {
      const s = Math.abs(fn)>=100 ? Math.round(fn).toString() : fn.toFixed(1);
      ctx.fillStyle=color; ctx.textAlign='left';
      ctx.fillText(`${n} → ${s}`, 10, 18+i*19);
    });
  }
}

function drawLegend() {
  const x = 18, y = 18, w = 130, h = 10;
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.font = '11px Georgia';

  // Bounded — solid amber arc swatch
  ctx.strokeStyle = '#c88228'; ctx.lineWidth = 1.8; ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(x + 10, y + 5, 8, Math.PI, 0); ctx.stroke();
  ctx.fillStyle = '#888'; ctx.textAlign = 'left';
  ctx.fillText('bounded', x + 24, y + 9);

  // Non-bounded — dashed navy swatch
  const by2 = y + 26;
  ctx.strokeStyle = 'rgb(40,65,180)'; ctx.lineWidth = 1.8; ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.arc(x + 10, by2 + 5, 8, Math.PI, 0); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#888'; ctx.textAlign = 'left';
  ctx.fillText('non-bounded', x + 24, by2 + 9);

  ctx.restore();
}

function drawOrbitAnimation() {
  if (!orbit.length) return;
  const ly = lineY();
  const ORBIT_COLOR = '#e0728a';
  const ORBIT_GLOW  = 'rgba(224, 114, 138,';

  // Faded past arcs
  for (let i = 0; i < orbitStep; i++) {
    const a = orbit[i], b = orbit[i+1];
    if (!isFinite(a) || !isFinite(b)) break;
    const h = arcHeight(a, b);
    const alpha = Math.max(0.1, 0.5 - i * 0.06);
    if (b >= VIEW_MIN && b <= VIEW_MAX && a >= VIEW_MIN && a <= VIEW_MAX) {
      ctx.globalAlpha = alpha;
      drawArcShape(a, b, h || 20, ORBIT_COLOR, 1.5);
      ctx.globalAlpha = 1;
    }
    if (a >= VIEW_MIN && a <= VIEW_MAX) {
      ctx.beginPath(); ctx.arc(toCanvasX(a), ly, 4, 0, Math.PI*2);
      ctx.fillStyle = `${ORBIT_GLOW}${alpha})`; ctx.fill();
    }
  }

  // Current position dot
  const curPos = orbit[orbitStep];
  if (isFinite(curPos) && curPos >= VIEW_MIN && curPos <= VIEW_MAX && arcT === 0) {
    const grd = ctx.createRadialGradient(toCanvasX(curPos), ly, 0, toCanvasX(curPos), ly, 22);
    grd.addColorStop(0, `${ORBIT_GLOW}0.45)`);
    grd.addColorStop(1, `${ORBIT_GLOW}0)`);
    ctx.beginPath(); ctx.arc(toCanvasX(curPos), ly, 22, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();
    ctx.beginPath(); ctx.arc(toCanvasX(curPos), ly, 6, 0, Math.PI*2);
    ctx.fillStyle = ORBIT_COLOR; ctx.fill();
    ctx.font = 'bold 13px Georgia'; ctx.fillStyle = ORBIT_COLOR; ctx.textAlign = 'center';
    ctx.fillText(curPos.toFixed(3), toCanvasX(curPos), ly + 38);
  }

  // Animate current hop
  if (arcT > 0 && orbitStep < orbit.length - 1) {
    const a = orbit[orbitStep], b = orbit[orbitStep + 1];
    if (!isFinite(a) || !isFinite(b)) return;
    const h = arcHeight(a, b) || 20;
    const easedT = ease(arcT);
    const cx1 = toCanvasX(a);
    const cx2 = b < VIEW_MIN ? -20 : b > VIEW_MAX ? W()+20 : toCanvasX(b);
    const ly_ = lineY();

    // Faint guide arc
    if (a >= VIEW_MIN && a <= VIEW_MAX && b >= VIEW_MIN && b <= VIEW_MAX) {
      ctx.globalAlpha = 0.15;
      drawArcShape(a, b, h, ORBIT_COLOR, 1);
      ctx.globalAlpha = 1;
    }

    // Draw arc path up to easedT
    ctx.beginPath(); ctx.moveTo(cx1, ly_);
    for (let s = 1; s <= Math.floor(easedT * 40); s++) {
      const pt = bezierPt(s/40, cx1,ly_, cx1,ly_-h, cx2,ly_-h, cx2,ly_);
      ctx.lineTo(pt.x, pt.y);
    }
    ctx.strokeStyle = ORBIT_COLOR; ctx.lineWidth = 2.2; ctx.stroke();

    // Traveling dot with glow
    const dotPt = bezierPt(easedT, cx1,ly_, cx1,ly_-h, cx2,ly_-h, cx2,ly_);
    const grd = ctx.createRadialGradient(dotPt.x, dotPt.y, 0, dotPt.x, dotPt.y, 18);
    grd.addColorStop(0, `${ORBIT_GLOW}0.5)`);
    grd.addColorStop(0.4, `${ORBIT_GLOW}0.25)`);
    grd.addColorStop(1, `${ORBIT_GLOW}0)`);
    ctx.beginPath(); ctx.arc(dotPt.x, dotPt.y, 18, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();
    ctx.beginPath(); ctx.arc(dotPt.x, dotPt.y, 6, 0, Math.PI*2);
    ctx.fillStyle = ORBIT_COLOR; ctx.fill();
    ctx.beginPath(); ctx.arc(dotPt.x, dotPt.y, 2.5, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();

    // Value label near dot
    const interpN = a + (b - a) * easedT;
    if (dotPt.y < ly_ - 8) {
      ctx.font = '12px Georgia'; ctx.fillStyle = ORBIT_COLOR;
      ctx.textAlign = 'center';
      ctx.fillText(interpN.toFixed(2), dotPt.x, dotPt.y - 10);
    }
  }
}

// --- Animation loop ---
let lastTs = null;
function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;

  if (isPlaying && orbit.length && orbitStep < orbit.length - 1) {
    if (pauseT > 0) {
      pauseT -= dt;
    } else {
      const _a = orbit[orbitStep], _b = orbit[orbitStep + 1];
      arcT += dt * speed;
      showArcInView(_a, _b);
      if (arcT >= 1) {
        arcT = 0;
        pauseT = PAUSE_DUR;
        orbitStep++;
        if (orbitStep >= orbit.length - 1 || !isFinite(orbit[orbitStep])) {
          isPlaying = false;
          pauseT = 0;
        }
        updateOrbitControls();
        updateOrbitPanel();
        centerTightOnPoint(orbit[orbitStep]);
      }
    }
  }

  stepView();

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#faf9f5';
  ctx.fillRect(0, 0, W(), H());

  drawFateBackground();
  if (!orbit.length) drawStaticArcs();
  drawNumberLine();
  drawFixedPoints();
  drawLegend();
  drawOrbitAnimation();

  requestAnimationFrame(loop);
}

// --- Controls ---
document.getElementById('cSlider').addEventListener('input', e => {
  c = parseFloat(e.target.value);
  document.getElementById('cVal').textContent = (c>=0?'+':'') + c.toFixed(2);
  document.getElementById('formula').textContent = `f(n) = n² ${c>=0?'+':'\u2212'} ${Math.abs(c).toFixed(2)}`;
  if (orbit.length) setOrbit(orbit[0]);
});

document.getElementById('speedSlider').addEventListener('input', e => {
  speed = parseFloat(e.target.value);
});

document.getElementById('btnStep').addEventListener('click', () => {
  if (orbitStep >= orbit.length - 1) return;
  isPlaying = true;
  const targetStep = orbitStep + 1;
  const check = setInterval(() => {
    if (orbitStep >= targetStep) { isPlaying = false; clearInterval(check); updateOrbitControls(); }
  }, 50);
  updateOrbitControls();
});

document.getElementById('btnPlay').addEventListener('click', () => {
  isPlaying = !isPlaying;
  updateOrbitControls();
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (orbit.length) setOrbit(orbit[0]);
});

document.getElementById('btnClear').addEventListener('click', () => {
  clearOrbit();
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const py = e.clientY - rect.top;
  if (Math.abs(py - lineY()) > 40) return;
  const n = Math.round(toMathX(e.clientX - rect.left) * 4) / 4;
  if (orbit.length && Math.abs(orbit[0] - n) < 0.15) {
    clearOrbit();
  } else {
    setOrbit(n);
    isPlaying = true;
    updateOrbitControls();
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  if (Math.abs(py - lineY()) < 55) {
    const nearest = Math.round(toMathX(px));
    hoveredN = (nearest >= Math.ceil(VIEW_MIN) && nearest <= Math.floor(VIEW_MAX)) ? nearest : null;
  } else {
    hoveredN = null;
  }
  canvas.style.cursor = hoveredN !== null ? 'pointer' : 'crosshair';
});

canvas.addEventListener('mouseleave', () => { hoveredN = null; });

window.addEventListener('resize', () => {
  canvas.width  = canvas.offsetWidth  * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
});

canvas.width  = canvas.offsetWidth  * devicePixelRatio;
canvas.height = canvas.offsetHeight * devicePixelRatio;
ctx.scale(devicePixelRatio, devicePixelRatio);
requestAnimationFrame(loop);
</script>
